# Automation layer: runs the orchestrator's tick mode when dispatched by
# Cloudflare, with manual dispatch retained for testing.
# No trading logic lives here - the orchestrator decides what (if
# anything) is due on each wake-up, in ET, against Alpaca's calendar.
#
# TIMEZONE NOTE: Cloudflare uses three UTC triggers so US daylight-saving
# changes need no manual edit:
#   45 12,13 * * MON-FRI       pre-market wake (08:45 ET)
#   30 13,14 * * MON-FRI       market-open execution wake (09:30 ET)
#   15,45 14-20 * * MON-FRI    daytime cycle wakes (10:15-15:45 ET)
# The union creates a few off-season extra wakes. Anchored ET slot gates make
# those exit in seconds; the external cron never decides what is due.
#
# ORDER SUBMISSION is never on by accident (paper account only - even
# "submit" means a PAPER order, never real money; the flag is named
# --submit precisely so it never reads as "real money"):
#   - automatic Cloudflare runs are dry-run unless the repo VARIABLE
#     TRADING_SUBMIT is set to exactly 'true'
#     (Settings -> Secrets and variables -> Actions -> Variables)
#   - manual runs are dry-run unless the 'submit' checkbox is ticked
#
# STATE between ticks: each run restores data/ from the most recent
# cache (state file + all pipeline file seams), and saves its own
# cache at the end. If a cache is ever lost mid-day the orchestrator
# degrades safely: idempotent stages re-run, execution's
# attempted-means-done rule plus the stale-decisions and deviation
# guards protect the order path.

name: trading

on:
  workflow_dispatch:
    inputs:
      automated:
        description: "Cloudflare automatic tick (leave off for manual runs)"
        type: boolean
        default: false
      stage:
        description: "What to run"
        type: choice
        default: tick
        options: [tick, premarket, premarket_exec, daytime_cycle, daily_scan, check]
      submit:
        description: "Submit paper orders (default: dry-run)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  # One queue for every invocation source: Cloudflare and manual runs can
  # never execute the trading pipeline at the same time.
  group: trading
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore the most recent data/ (state + file seams) so this
      # fresh VM continues the same trading day the last tick left.
      - name: Restore pipeline state
        uses: actions/cache/restore@v4
        with:
          path: data
          key: trading-data-${{ github.run_id }}   # never matches; forces restore-keys
          restore-keys: trading-data-

      - name: Ensure data dir exists (cache save needs it)
        run: mkdir -p data

      - name: Run orchestrator
        run: |
          SUBMIT_FLAG=""
          if [ "${{ inputs.automated }}" = "true" ] && [ "${{ vars.TRADING_SUBMIT }}" = "true" ]; then
            SUBMIT_FLAG="--submit"
          fi
          if [ "${{ inputs.automated }}" != "true" ] && [ "${{ inputs.submit }}" = "true" ]; then
            SUBMIT_FLAG="--submit"
          fi
          if [ "${{ inputs.automated }}" != "true" ] && [ "${{ inputs.stage }}" != "tick" ]; then
            python -m orchestrator --force "${{ inputs.stage }}" $SUBMIT_FLAG
          else
            python -m orchestrator --tick $SUBMIT_FLAG
          fi

      - name: Save pipeline state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: trading-data-${{ github.run_id }}

      # One commit per day: only after the orchestrator marks the day
      # complete, and only if the records differ from what's already
      # committed (later ticks exit before touching them, so this is
      # naturally idempotent). Commits the whole dated record: the
      # day's lists/cases/decisions and the daily report.
      - name: Commit daily records (end of day)
        if: inputs.automated == true
        run: |
          if [ -f data/orchestrator_state.json ] && [ "$(jq -r '.day_complete' data/orchestrator_state.json)" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/lists data/reports
            if ! git diff --cached --quiet; then
              git commit -m "daily records $(jq -r '.date' data/orchestrator_state.json)"
              git pull --rebase origin main
              git push origin main
            fi
          fi
