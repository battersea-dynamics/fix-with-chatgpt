name: scheduler-heartbeat

on:
  schedule:
    - cron: "*/5 * * * 1-5"

permissions:
  contents: read

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Print scheduler times
        run: |
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "UK:  $(TZ=Europe/London date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "US:  $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S %Z')"
